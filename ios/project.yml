name: CRMApp
options:
  bundleIdPrefix: je.eg.crm
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  CRMApp:
    type: application
    platform: iOS
    sources:
      - path: CRMApp
        type: group
    info:
      path: CRMApp/Info.plist
      properties:
        CFBundleDisplayName: CRM
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        NSCameraUsageDescription: "Нужен для съёмки и прикрепления фото к задачам и письмам."
        NSPhotoLibraryUsageDescription: "Нужен для прикрепления фото к задачам и письмам."
        NSMicrophoneUsageDescription: "Нужен для записи голосовых вложений."
        NSFaceIDUsageDescription: "Используется для входа в CRM по Face ID без ввода пароля."
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarStyle: UIStatusBarStyleDefault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: je.eg.crm.CRMApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
