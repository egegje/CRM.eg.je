<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>crm.eg.je</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<div id="login-screen" class="hidden">
  <div class="login-box">
    <h1>crm.eg.je</h1>
    <form id="login-form">
      <input name="email" type="email" placeholder="email" required />
      <input name="password" type="password" placeholder="пароль" required />
      <button type="submit">Войти</button>
      <div id="login-error" class="error"></div>
    </form>
    <button type="button" class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div id="app" class="hidden">
  <button class="burger" onclick="toggleSidebar()" aria-label="меню">☰</button>
  <aside class="sidebar">
    <div class="brand">crm.eg.je</div>
    <button class="compose-btn" onclick="openCompose()">✉️ Написать</button>
    <div class="folders">
      <div class="folder-group">
        <div class="folder-title">Ящики</div>
        <div id="mailboxes-list"></div>
      </div>
      <div class="folder-group">
        <div class="folder-title">Папки</div>
        <div id="folders-list"></div>
        <button class="link-btn" onclick="createFolder()">+ новая папка</button>
      </div>
    </div>
    <div class="user-box">
      <span id="user-email"></span>
      <button id="admin-btn" class="link-btn hidden" onclick="openAdmin()">⚙ Админка</button>
      <button class="link-btn" onclick="logout()">выйти</button>
      <button class="link-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </aside>

  <main class="list-pane">
    <div class="toolbar">
      <input id="search-input" type="search" placeholder="поиск..." oninput="debouncedSearch()" />
      <select id="status-filter" onchange="refreshList()">
        <option value="all">все</option>
        <option value="unread">непрочитанные</option>
        <option value="read">прочитанные</option>
      </select>
      <button onclick="refreshList()">🔄</button>
    </div>
    <div id="messages-list" class="messages-list"></div>
  </main>

  <section class="preview-pane">
    <div id="message-preview" class="empty">Выберите письмо</div>
  </section>
</div>

<div id="admin-modal" class="modal hidden">
  <div class="modal-box admin-box">
    <div class="modal-header">
      <h3>Админка</h3>
      <button onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-tabs">
      <button class="tab active" data-tab="users" onclick="switchTab('users')">Пользователи</button>
      <button class="tab" data-tab="mailboxes" onclick="switchTab('mailboxes')">Ящики</button>
      <button class="tab" data-tab="rules" onclick="switchTab('rules')">Правила</button>
      <button class="tab" data-tab="contacts" onclick="switchTab('contacts')">Контакты</button>
      <button class="tab" data-tab="audit" onclick="switchTab('audit')">Журнал</button>
    </div>
    <div id="admin-content"></div>
  </div>
</div>

<div id="compose-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Новое письмо</h3>
      <button onclick="closeCompose()">✕</button>
    </div>
    <form id="compose-form">
      <label>От: <select name="mailboxId" id="compose-mailbox"></select></label>
      <label>Кому: <input name="to" placeholder="to@example.com, ..." required /></label>
      <label>Копия: <input name="cc" placeholder="cc@example.com, ..." /></label>
      <label>Тема: <input name="subject" /></label>
      <textarea name="bodyText" rows="14" placeholder="текст..."></textarea>
      <label class="inline">
        Отложить до: <input type="datetime-local" name="sendAt" />
      </label>
      <div class="compose-actions">
        <button type="button" onclick="closeCompose()">Отмена</button>
        <button type="submit">Отправить</button>
      </div>
      <div id="compose-error" class="error"></div>
    </form>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
