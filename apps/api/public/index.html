<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>crm.eg.je</title>
<link rel="stylesheet" href="/app.css" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#2563eb" />
</head>
<body>
<div id="login-screen" class="hidden">
  <div class="login-box">
    <h1>crm.eg.je</h1>
    <form id="login-form">
      <input name="email" type="email" placeholder="email" required />
      <input name="password" type="password" placeholder="пароль" required />
      <button type="submit">Войти</button>
      <div id="login-error" class="error"></div>
      <button type="button" class="link-btn" onclick="forgotPassword()" style="margin-top:8px;text-align:center;width:100%">Забыли пароль?</button>
    </form>
    <button type="button" class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div id="app" class="hidden">
  <button class="burger" onclick="toggleSidebar()" aria-label="меню">☰</button>
  <aside class="sidebar">
    <div class="brand">
      <span>crm.eg.je <span id="outbox-badge" class="badge"></span></span>
      <button class="sidebar-close" onclick="toggleSidebar()" aria-label="закрыть">←</button>
    </div>
    <button class="compose-btn" onclick="openCompose()">✉️ Написать</button>
    <div class="folder-group" style="margin-bottom:12px">
      <div class="folder-title">✅ Задачи</div>
      <div class="folder-item" onclick="showTasksView()">📋 Все</div>
      <div class="folder-item" onclick="showTasksView('me')">📌 Мои</div>
      <div class="folder-item" onclick="showTasksView('overdue')">⏰ Просроченные</div>
    </div>
    <div class="folders">
      <div class="folder-group">
        <div class="folder-title">Ящики</div>
        <div id="mailboxes-list"></div>
      </div>
      <div class="folder-group">
        <div class="folder-title">Папки</div>
        <div id="folders-list"></div>
        <button class="link-btn" onclick="createFolder()">+ новая папка</button>
      </div>
    </div>
    <div class="user-box">
      <span id="user-email"></span>
      <span id="version-footer" style="font-size:10px;color:var(--text-muted);font-family:monospace"></span>
      <button class="link-btn" onclick="openSettings()">🔧 Настройки</button>
      <button id="admin-btn" class="link-btn hidden" onclick="openAdmin()">⚙ Админка</button>
      <button class="link-btn" onclick="logout()">выйти</button>
      <button class="link-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </aside>

  <main class="list-pane">
    <div class="toolbar">
      <input id="search-input" type="search" placeholder="поиск..." oninput="debouncedSearch()" />
      <select id="status-filter" onchange="refreshList()">
        <option value="all">все</option>
        <option value="unread">непрочитанные</option>
        <option value="read">прочитанные</option>
      </select>
      <input type="date" id="date-from" onchange="refreshList()" title="с" />
      <input type="date" id="date-to" onchange="refreshList()" title="по" />
      <button onclick="refreshList()">🔄</button>
      <button onclick="openStats()" title="статистика">📊</button>
    </div>
    <div id="messages-list" class="messages-list"></div>
  </main>

  <section id="tasks-view" class="hidden" style="padding:18px;overflow-y:auto;border-right:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 id="tasks-view-title" style="margin:0">Задачи</h2>
      <button class="primary" onclick="openTaskForm()" style="padding:8px 14px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer">+ Задача</button>
    </div>
    <input id="tasks-search" placeholder="🔍 поиск..." oninput="loadTasks()" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);margin-bottom:12px">
    <div id="tasks-list"></div>
  </section>

  <section class="preview-pane">
    <div id="message-preview" class="empty">Выберите письмо</div>
  </section>
</div>

<div id="task-form-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="task-form-title">Новая задача</h3>
      <button onclick="closeModal('task-form-modal')">✕</button>
    </div>
    <form id="task-form" onsubmit="saveTask(event)" style="padding:20px;display:flex;flex-direction:column;gap:10px">
      <input type="hidden" name="id">
      <label style="font-size:11px;color:var(--text-muted)">Заголовок<input name="title" required style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"></label>
      <label style="font-size:11px;color:var(--text-muted)">Описание<textarea name="description" rows="4" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:inherit"></textarea></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <label style="font-size:11px;color:var(--text-muted)">Исполнитель<select name="assigneeId" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">—</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Проект<select name="projectId" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">—</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Дедлайн<input name="dueDate" type="datetime-local" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"></label>
        <label style="font-size:11px;color:var(--text-muted)">Приоритет<select name="priority" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="low">низкий</option><option value="normal" selected>обычный</option><option value="high">высокий</option><option value="urgent">срочный</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Категория<input name="category" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"></label>
        <label style="font-size:11px;color:var(--text-muted)">Статус<select name="status" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="open">открыта</option><option value="in_progress">в работе</option><option value="done">выполнена</option><option value="cancelled">отменена</option></select></label>
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;margin-top:10px">
        <button type="button" id="task-delete-btn" class="link-btn" onclick="deleteTask()" style="color:var(--danger);display:none">🗑 удалить</button>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button type="button" onclick="closeModal('task-form-modal')">Отмена</button>
          <button type="submit" style="background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer">Сохранить</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="settings-modal" class="modal hidden">
  <div class="modal-box" style="width:420px">
    <div class="modal-header"><h3>Настройки</h3><button onclick="closeSettings()">✕</button></div>
    <form id="settings-form" style="padding:20px;display:flex;flex-direction:column;gap:12px">
      <label>Текущий пароль <input name="oldPassword" type="password" required></label>
      <label>Новый пароль <input name="newPassword" type="password" minlength="4" required></label>
      <button type="submit" style="padding:10px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer">Сменить пароль</button>
      <div id="settings-msg" class="error"></div>
    </form>
    <div style="padding:0 20px 20px">
      <label style="display:flex;align-items:center;gap:10px;font-size:13px">
        Акцентный цвет:
        <input type="color" id="accent-picker" onchange="setAccent(this.value)">
      </label>
    </div>
  </div>
</div>

<div id="admin-modal" class="modal hidden">
  <div class="modal-box admin-box">
    <div class="modal-header">
      <h3>Админка</h3>
      <button onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-tabs">
      <button class="tab active" data-tab="users" onclick="switchTab('users')">Пользователи</button>
      <button class="tab" data-tab="mailboxes" onclick="switchTab('mailboxes')">Ящики</button>
      <button class="tab" data-tab="rules" onclick="switchTab('rules')">Правила</button>
      <button class="tab" data-tab="contacts" onclick="switchTab('contacts')">Контакты</button>
      <button class="tab" data-tab="audit" onclick="switchTab('audit')">Журнал</button>
      <button class="tab" data-tab="analytics" onclick="switchTab('analytics')">Аналитика</button>
      <button class="tab" data-tab="tgchats" onclick="switchTab('tgchats')">TG чаты</button>
      <button class="tab" data-tab="tgbindings" onclick="switchTab('tgbindings')">TG привязки</button>
    </div>
    <div id="admin-content"></div>
  </div>
</div>

<nav class="tabbar" id="tabbar">
  <button onclick="state.currentFolder='__inbox';refreshList()">📥</button>
  <button onclick="openCompose()">✉️</button>
  <button onclick="document.getElementById('search-input').focus()">🔍</button>
  <button onclick="toggleSidebar()">☰</button>
</nav>

<div id="compose-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Новое письмо</h3>
      <button onclick="closeCompose()">✕</button>
    </div>
    <form id="compose-form">
      <label>От: <select name="mailboxId" id="compose-mailbox"></select></label>
      <label>Кому: <input name="to" list="contacts-list" placeholder="to@example.com, ..." required /></label>
      <label>Копия: <input name="cc" list="contacts-list" placeholder="cc@example.com, ..." /></label>
      <datalist id="contacts-list"></datalist>
      <label>Тема: <input name="subject" /></label>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="template-select" onchange="applyTemplate(this.value);this.value=''">
          <option value="">📋 шаблон...</option>
        </select>
        <button type="button" onclick="saveAsTemplate()" style="font-size:12px">+ сохранить как шаблон</button>
      </div>
      <textarea name="bodyText" rows="12" placeholder="текст..."></textarea>
      <label>Вложения: <input type="file" id="compose-files" multiple /></label>
      <div id="compose-attachments"></div>
      <label class="inline">
        Отложить до: <input type="datetime-local" name="sendAt" />
      </label>
      <progress id="upload-progress" class="hidden" value="0" max="100" style="width:100%"></progress>
      <div class="compose-actions">
        <button type="button" onclick="closeCompose()">Отмена</button>
        <button type="submit">Отправить</button>
      </div>
      <div id="compose-error" class="error"></div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
