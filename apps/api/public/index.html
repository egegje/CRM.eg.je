<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>METR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css?v=87" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#6366F1" />
</head>
<body>
<div id="login-screen" class="hidden">
  <div class="login-box">
    <h1 style="font-weight:800;letter-spacing:2px">METR</h1>
    <form id="login-form">
      <input name="email" type="email" placeholder="email" required />
      <input name="password" type="password" placeholder="пароль" required />
      <button type="submit">Войти</button>
      <div id="login-error" class="error"></div>
      <button type="button" class="link-btn" onclick="forgotPassword()" style="margin-top:8px;text-align:center;width:100%">Забыли пароль?</button>
    </form>
    <button type="button" class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</div>

<div id="app" class="hidden">
  <nav class="icon-bar" id="icon-bar">
    <div class="ib-item active" data-section="home" onclick="switchSection('home')" title="Главная"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="ib-item" data-section="mail" onclick="switchSection('mail')" title="Почта"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/></svg></div>
    <div class="ib-item" data-section="tasks" onclick="switchSection('tasks')" title="Задачи"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h9"/></svg></div>
    <div class="ib-item" id="ib-finance" style="display:none" data-section="finance" onclick="switchSection('finance')" title="Финансы"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
    <div style="flex:1"></div>
    <div class="ib-item" id="ib-admin" style="display:none" data-section="admin" onclick="switchSection('admin')" title="Админка"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
    <div class="ib-item" onclick="toggleTheme()" title="Тема"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></div>
    <div class="ib-item" onclick="logout()" title="Выйти"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></div>
  </nav>
  <button class="burger" onclick="toggleSidebar()" aria-label="меню">☰</button>
  <aside class="sidebar" id="main-sidebar">
    
    <div class="brand">
      <span class="folder-label">METR</span><span class="brand-mini">M</span><span id="outbox-badge" class="badge"></span>
      <button class="sidebar-close" onclick="toggleSidebar()" aria-label="закрыть">←</button>
    </div>
    <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" onclick="toggleSidebarCollapse()" title="Свернуть"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="compose-wrap" style="padding:0 0 10px">
      <button class="compose-btn" onclick="openCompose()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:6px"><path d="M12 5v14M5 12h14"/></svg><span class="folder-label">Написать</span></button>
      <button class="compose-btn-mini" onclick="openCompose()" title="Написать"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg></button>
    </div>
    <div class="folders">
      <div class="folder-group" id="folders-group">
        <div id="folders-list"></div>
      </div>
      <div class="folder-group sidebar-label" id="mailboxes-group">
        <div class="folder-title" onclick="this.parentElement.classList.toggle('collapsed-group')" style="cursor:pointer;user-select:none">Ящики ▾</div>
        <div id="mailboxes-list"></div>
      </div>
      <div class="folder-group sidebar-label" id="sheets-group">
        <div class="folder-title" onclick="this.parentElement.classList.toggle('collapsed-group')" style="cursor:pointer;user-select:none">Таблицы ▾</div>
        <div id="sheets-list"></div>
      </div>
    </div>
    <div class="user-box" style="display:none">
      <span id="user-email"></span>
      <span id="version-footer" style="font-size:8px;opacity:0.2"></span>
      <span id="admin-btn" class="hidden"></span>
    </div>
    
  </aside>

  <div class="resizer" id="resizer-1"></div>

  <main class="list-pane">
    <div class="toolbar" style="padding:6px 10px;gap:6px">
      <input id="search-input" type="search" placeholder="Поиск в почте..." oninput="debouncedSearch()" />
      <button onclick="document.getElementById('search-adv').style.display=document.getElementById('search-adv').style.display==='block'?'none':'block'" title="Фильтры" style="padding:4px 8px;font-size:12px">▼</button>
      
    </div>
    <div id="search-adv" style="display:none;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg-alt)">
      <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;font-size:12px;align-items:center;max-width:400px">
        <span style="color:var(--text-muted)">От</span><input id="search-from-field" placeholder="отправитель" onchange="refreshList()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)">
        <span style="color:var(--text-muted)">Кому</span><input id="search-to-field" placeholder="получатель" onchange="refreshList()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)">
        <span style="color:var(--text-muted)">Тема</span><input id="search-subject-field" placeholder="тема" onchange="refreshList()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)">
        <span style="color:var(--text-muted)">Дата</span><div style="display:flex;gap:4px"><input type="date" id="date-from" onchange="refreshList()" style="padding:3px 6px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)"><input type="date" id="date-to" onchange="refreshList()" style="padding:3px 6px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)"></div>
        <span style="color:var(--text-muted)">Папка</span><select id="search-folder" onchange="refreshList()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)"><option value="">Текущая</option><option value="all">Все</option><option value="inbox">Входящие</option><option value="sent">Отправленные</option></select>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <select id="status-filter" onchange="refreshList()" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text)"><option value="all">все</option><option value="unread">непрочит.</option><option value="read">прочит.</option></select>
        <button onclick="refreshList()" style="padding:4px 14px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Поиск</button>
      </div>
      <select id="search-scope" style="display:none"><option value="all" selected>all</option></select>
    </div>
    <div id="messages-list" class="messages-list" style="position:relative"></div>
  </main>

  <div class="resizer" id="resizer-2"></div>

  <section id="home-view" class="hidden"></section>

  <section id="admin-view" class="hidden" style="padding:18px;overflow-y:auto;border-right:1px solid var(--border)">
    <h2 style="margin:0 0 14px">⚙ Админка</h2>
    <div class="admin-tabs" id="admin-view-tabs">
      <button class="tab active" data-tab="users" onclick="switchTab('users')">Пользователи</button>
      <button class="tab" data-tab="mailboxes" onclick="switchTab('mailboxes')">Ящики</button>
      <button class="tab" data-tab="rules" onclick="switchTab('rules')">Правила</button>
      <button class="tab" data-tab="contacts" onclick="switchTab('contacts')">Контакты</button>
      <button class="tab" data-tab="analytics" onclick="switchTab('analytics')">Аналитика</button>
      <button class="tab" data-tab="telegram" onclick="switchTab('telegram')">Telegram</button>
      <button class="tab" data-tab="tasksettings" onclick="switchTab('tasksettings')">Задачи</button>
      <button class="tab" data-tab="personas" onclick="switchTab('personas')">Сотрудники</button>
      <button class="tab" data-tab="sheets" onclick="switchTab('sheets')">Таблицы</button>
    </div>
    <div id="admin-view-content" style="padding:16px 0"></div>
  </section>

  <section id="team-view" class="hidden" style="padding:18px;overflow-y:auto;border-right:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="margin:0">👥 Команда</h2>
    </div>
    <div id="team-list"></div>
  </section>

  <section id="finance-view" class="hidden" style="padding:18px;overflow-y:auto;border-right:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <h2 style="margin:0" id="finance-title">💰 Финансы</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button id="sber-connect-btn" onclick="connectSber()" style="padding:8px 14px;background:#21a038;color:white;border:none;border-radius:5px;cursor:pointer;display:none">🏦 Подключить Сбер</button>
        <button id="sber-load-btn" onclick="loadSberData()" style="padding:8px 14px;background:#21a038;color:white;border:none;border-radius:5px;cursor:pointer;display:none">🔄 Обновить остатки</button>
      </div>
    </div>
    <div id="sber-status" style="margin-bottom:12px"></div>
    <div id="sber-data" style="margin-bottom:18px"></div>
    <div id="sber-statement" style="display:none;margin-bottom:18px"></div>
    <div id="finance-totals" style="margin-bottom:14px;padding:12px;background:var(--bg-alt);border:1px solid var(--border);border-radius:6px"></div>
    <div id="finance-list"></div>
  </section>

  <section id="tasks-view" class="hidden" style="padding:18px;overflow-y:auto;border-right:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <h2 id="tasks-view-title" style="margin:0">Задачи</h2>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="kanban-back-btn" onclick="showTasksView(localStorage.getItem('crm-tasks-filter') || 'me')" style="display:none;padding:8px 14px;background:var(--bg-alt);color:var(--text);border:1px solid var(--border);border-radius:5px;cursor:pointer">← Назад</button>
        <button onclick="showKanbanView()" style="padding:8px 14px;background:var(--bg-alt);color:var(--text);border:1px solid var(--border);border-radius:5px;cursor:pointer">🗂 Канбан</button>
        <button class="primary" onclick="openTaskForm()" style="padding:8px 14px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer">+ Задача</button>
      </div>
    </div>
    <div id="tasks-subnav" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button data-nav="me" draggable="true" onclick="showTasksView('me')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">📌 Мои</button>
      <button data-nav="createdByMe" draggable="true" onclick="showTasksView('createdByMe')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">📤 Поставлено мной</button>
      <button data-nav="unassigned" draggable="true" onclick="showTasksView('unassigned')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">❓ Без исполнителя</button>
      <button data-nav="overdue" draggable="true" onclick="showTasksView('overdue')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">⏰ Просроченные</button>
      <button data-nav="done" draggable="true" onclick="showTasksView('done')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">✔️ Выполненные</button>
      <button data-nav="team" id="team-subnav-btn" draggable="true" onclick="showTasksView('team')" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:grab;font-size:12px;color:var(--text)">👥 Команда</button>
      <span style="position:relative;display:inline-block">
        <button id="tasks-sheets-btn" onclick="toggleTasksSheets()" class="subnav-btn" style="padding:6px 12px;border:1px solid var(--border);border-radius:5px;background:var(--bg-alt);cursor:pointer;font-size:12px;color:var(--text)">📋 Таблицы</button>
        <div id="tasks-sheets-dropdown" style="display:none;position:absolute;top:100%;left:0;z-index:100;min-width:220px;background:var(--bg);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:6px 0;margin-top:4px"></div>
      </span>
    </div>
    <div id="tasks-filters" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input id="tasks-search" placeholder="🔍 поиск..." oninput="loadTasks()" style="flex:1;min-width:180px;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)">
      <select id="tasks-assignee-filter" onchange="loadTasks()" style="padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);display:none"><option value="">все исполнители</option></select>
      <select id="tasks-label-filter" onchange="loadTasks()" style="padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);display:none"><option value="">все метки</option></select>
      <select id="tasks-tag-filter" onchange="loadTasks()" style="padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">все теги</option></select>
    </div>
    <div id="tasks-list"></div>
  </section>

  <section class="preview-pane" id="preview-pane">
    <div id="message-preview" class="empty">Выберите письмо</div>
  </section>
</div>

<div id="task-form-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="task-form-title">Новая задача</h3>
      <button onclick="closeModal('task-form-modal')">✕</button>
    </div>
    <form id="task-form" onsubmit="saveTask(event)" style="padding:20px;display:flex;flex-direction:column;gap:10px">
      <input type="hidden" name="id">
      <label style="font-size:11px;color:var(--text-muted)">Заголовок<input name="title" required style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"></label>
      <label style="font-size:11px;color:var(--text-muted)">Описание<textarea name="description" rows="4" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:inherit"></textarea></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <label style="font-size:11px;color:var(--text-muted)">Исполнитель<select name="assigneeId" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">—</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Проект<select name="projectId" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">—</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Дедлайн<input name="dueDate" type="datetime-local" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"></label>
        <label style="font-size:11px;color:var(--text-muted)">Приоритет<select name="priority" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="low">низкий</option><option value="normal" selected>обычный</option><option value="high">высокий</option><option value="urgent">срочный</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Метка<select name="category" id="task-category-select" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="">—</option></select></label>
        <label style="font-size:11px;color:var(--text-muted)">Статус<select name="status" style="width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)"><option value="open">открыта</option><option value="in_progress">в работе</option><option value="done">выполнена</option><option value="cancelled">отменена</option></select></label>
      </div>
      <div id="task-tags-row" style="display:none;flex-direction:column;gap:6px">
        <span style="font-size:11px;color:var(--text-muted)">Теги</span>
        <div id="task-tags-list" style="display:flex;flex-wrap:wrap;gap:6px;align-items:center"></div>
      </div>
      <div id="task-attach-row" style="display:none;flex-direction:column;gap:6px">
        <span style="font-size:11px;color:var(--text-muted)">Файлы</span>
        <div id="task-attach-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
        <input type="file" id="task-attach-file" multiple style="font-size:11px">
      </div>
      <div id="task-comments-row" style="display:none;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding-top:10px;margin-top:6px">
        <span style="font-size:11px;color:var(--text-muted)">Комментарии</span>
        <div id="task-comments-list" style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
        <div style="display:flex;gap:6px">
          <input id="task-comment-input" placeholder="написать комментарий..." style="flex:1;padding:8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)">
          <button type="button" onclick="addTaskComment()" style="padding:8px 14px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer">Отправить</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;margin-top:10px">
        <button type="button" id="task-delete-btn" class="link-btn" onclick="deleteTask()" style="color:var(--danger);display:none">🗑 удалить</button>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button type="button" onclick="closeModal('task-form-modal')">Отмена</button>
          <button type="submit" style="background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer">Сохранить</button>
        </div>
      </div>
    </form>
  </div>
</div>



<nav class="tabbar" id="tabbar">

<div id="compose-modal" class="modal hidden">
  <div class="modal-box compose-box">
    <div class="modal-header compose-header">
      <h3 id="compose-modal-title">Новое письмо</h3>
      <div class="compose-header-btns">
        <button type="button" onclick="toggleComposeMinimize()" title="Свернуть">─</button>
        <button type="button" onclick="closeCompose()" title="Закрыть">✕</button>
      </div>
    </div>
    <form id="compose-form">
      <div class="compose-field-row">
        <span class="compose-field-label">Кому</span>
        <input name="to" list="contacts-list" placeholder="to@example.com, ..." required />
      </div>
      <div class="compose-field-row">
        <span class="compose-field-label">Копия</span>
        <input name="cc" list="contacts-list" placeholder="cc@example.com, ..." />
      </div>
      <datalist id="contacts-list"></datalist>
      <div class="compose-field-row">
        <span class="compose-field-label">От кого</span>
        <select name="mailboxId" id="compose-mailbox"></select>
        <select name="personaId" id="compose-persona"><option value="">— без визитки —</option></select>
      </div>
      <div class="compose-field-row">
        <span class="compose-field-label">Тема</span>
        <input name="subject" placeholder="Тема письма" />
      </div>
      <div class="compose-attach-bar">
        <label class="compose-attach-btn">📎 Прикрепить файл <input type="file" id="compose-files" multiple style="display:none" onchange="updateAttachList();uploadAttachNow()" /></label>
        <select id="template-select" onchange="applyTemplate(this.value);this.value=''">
          <option value="">📋 Шаблон...</option>
        </select>
        <button type="button" onclick="saveAsTemplate()" class="compose-tpl-save">+ сохранить</button>
        <div id="compose-attachments" class="compose-file-list"></div>
      </div>
      <progress id="upload-progress" class="hidden" value="0" max="100" style="width:100%"></progress>
      <div id="tracking-toggle-row" style="display:flex;align-items:center;gap:10px;padding:0 4px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text-muted);user-select:none">
          <input type="checkbox" id="track-response-cb" onchange="toggleTrackingOptions()" style="width:16px;height:16px;cursor:pointer">
          <span>&#x1F514; Отслеживать ответ</span>
        </label>
        <div id="tracking-options" style="display:none;align-items:center;gap:6px;flex-wrap:wrap">
          <button type="button" class="track-day-btn" data-days="3" onclick="selectTrackDays(3)">3 дня</button>
          <button type="button" class="track-day-btn" data-days="7" onclick="selectTrackDays(7)">7 дней</button>
          <button type="button" class="track-day-btn" data-days="14" onclick="selectTrackDays(14)">14 дней</button>
          <button type="button" class="track-day-btn" data-days="30" onclick="selectTrackDays(30)">30 дней</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted)">
            <input type="number" id="track-custom-days" min="1" max="365" style="width:50px;padding:4px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px" onchange="selectTrackDays(parseInt(this.value)||7)" placeholder="N">
            дн.
          </label>
        </div>
      </div>
      <textarea name="bodyText" placeholder="Текст письма..."></textarea>
      <div id="compose-error" class="error"></div>
      <div class="compose-bottom-bar">
        <div class="compose-bottom-left">
          <button type="submit" class="compose-btn-send">Отправить</button>
          <button type="button" onclick="closeCompose()" class="compose-btn-secondary">Отменить</button>
        </div>
        <div class="compose-bottom-right">
          <label class="compose-btn-secondary compose-schedule-label">⏰ Отложить <input type="datetime-local" name="sendAt" /></label>
        </div>
      </div>
    </form>
  </div>
</div>
<div id="compose-minimized" class="compose-minimized hidden" onclick="toggleComposeMinimize()">
  <span>Новое письмо</span>
  <button type="button" onclick="event.stopPropagation();toggleComposeMinimize()">▢</button>
  <button type="button" onclick="event.stopPropagation();closeCompose()">✕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
